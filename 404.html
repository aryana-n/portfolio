<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting...</title>
    <script>
      // Get the current path
      const path = window.location.pathname;

      // Redirect to root with the path preserved in the hash
      // This keeps your SPA "pages" intact
      window.location.replace("/#" + path);
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
